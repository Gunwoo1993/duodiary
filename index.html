<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DuoDiary</title>
    <script>
      // Workaround for "Cannot set property fetch of #<Window> which has only a getter"
      // This can happen when some libraries try to polyfill fetch in certain environments.
      try {
        const descriptor = Object.getOwnPropertyDescriptor(window, 'fetch');
        if (descriptor && !descriptor.writable && descriptor.configurable) {
          const originalFetch = window.fetch;
          Object.defineProperty(window, 'fetch', {
            value: originalFetch,
            writable: true,
            configurable: true,
            enumerable: true
          });
        }
      } catch (e) {
        console.warn('Fetch polyfill workaround failed:', e);
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
